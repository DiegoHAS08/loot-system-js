<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tactical Drop Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Tactical Drop Simulator</h1>
            <p>Sorteie equipamentos de raridade militar</p>
        </header>

        <div class="display-area">
            <div id="drop-card" class="card empty">?</div>
        </div>

        <div class="actions">
            <button id="draw-btn">Abrir Caixa</button>
            <button id="reset-btn">Resetar Inventário</button>
        </div>

        <div class="inventory">
            <h3>Seu Inventário</h3>
            <ul id="inventory-list"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
